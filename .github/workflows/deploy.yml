name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy pre-built dist to gh-pages
        run: |
          sed -i "s|<base href=\"/\">|<base href=\"/${{ github.event.repository.name }}/\">|g" dist/apps/web/browser/index.html
          touch dist/apps/web/browser/.nojekyll
          cd dist/apps/web/browser
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: $(date +'%Y-%m-%d %H:%M:%S') from ${{ github.sha }}"
          git push --force \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            HEAD:gh-pages
